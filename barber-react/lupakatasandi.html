<div class="relative group">

<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Input Konfirmasi Kata Sandi Baru -->

<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>

<button class="w-full bg-primary-container hover:bg-primary text-on-primary-container font-bold py-4 rounded-md transition-all transform active:scale-95 shadow-lg flex items-center justify-center gap-2 mt-4" type="submit">

</button>
